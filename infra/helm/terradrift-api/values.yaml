image:
  repository: ghcr.io/barrie20/terradrift
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false

opentelemetry:
  enabled: true
  exporter: otlp
  endpoint: otel-collector.observability.svc:4317

prometheus:
  serviceMonitor:
    enabled: true
    interval: 30s
