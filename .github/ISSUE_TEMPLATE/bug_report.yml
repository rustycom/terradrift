name: Bug report
description: Something broke. Help us reproduce it.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. terradrift scan ./...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: TerraDrift version
      placeholder: "0.1.0"
    validations:
      required: true
