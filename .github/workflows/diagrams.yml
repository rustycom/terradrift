name: diagrams

on:
  push:
    paths:
      - "infra/terraform/**"
      - "src/terradrift/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-docs/gh-actions@v1
        with:
          working-dir: infra/terraform
          output-file: README.md
          output-method: inject
          git-push: false

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(arch): regenerate Terraform docs"
          file_pattern: infra/terraform/README.md
