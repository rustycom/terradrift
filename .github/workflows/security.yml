name: security

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC nightly
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  security-events: write

jobs:
  iac-scan:
    name: Checkov + Trivy on infra/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          output_format: sarif
          output_file_path: reports/checkov.sarif
          soft_fail: true

      - name: Prepare reports dir
        run: mkdir -p reports

      - name: Trivy config
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: config
          scan-ref: infra/
          format: sarif
          output: reports/trivy.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIFs
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: reports/

      - name: Commit nightly report
        if: github.event_name == 'schedule'
        run: |
          mkdir -p reports
          DATE=$(date +%F)
          {
            echo "# Nightly security scan — $DATE"
            echo
            echo "Generated by .github/workflows/security.yml."
          } > "reports/$DATE-security.md"
      - name: Auto-commit
        if: github.event_name == 'schedule'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(security): nightly scan"
          file_pattern: reports/*

  python-scan:
    name: Semgrep + pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install semgrep pip-audit
      - run: semgrep --config p/python --config p/owasp-top-ten --error || true
      - run: pip-audit -r <(pip install -e . --dry-run --report -) || true
